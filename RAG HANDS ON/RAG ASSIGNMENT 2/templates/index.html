<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Assistant | AI Agents Webinar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <header>
            <div class="logo">
                <span class="dot"></span>
                <h1>AI Feedback Assistant</h1>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </header>

        <main id="chatWindow" class="chat-window">
            <div class="message bot">
                <div class="avatar">AI</div>
                <div class="text-content">
                    <p>{{ greeting }}</p>
                </div>
            </div>
        </main>

        <footer>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your response here..." autocomplete="off">
                <button id="sendBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- Summary Modal -->
    <div id="summaryModal" class="modal">
        <div class="modal-content">
            <h2>Feedback Summary</h2>
            <div id="summaryList"></div>
            <button onclick="location.reload()" class="restart-btn">Close & Restart</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
